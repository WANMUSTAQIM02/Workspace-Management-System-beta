<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Ideas & Support</title>
    <link rel="stylesheet" href="style.css?v=3.1.4">
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .idea-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .idea-card { background: var(--bg-surface); padding: 24px; border-radius: 16px; border: 1px solid var(--border-color); }
        .vote-btn { background: rgba(0,122,255,0.1); border: none; color: var(--brand-blue); padding: 8px 16px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body class="dark-theme">
    <div class="central-wrapper" style="padding-top: 40px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h2>Community Idea Board</h2>
            <button onclick="document.getElementById('idea-modal').style.display='flex'" class="btn-action-primary" style="width: auto;">+ Post New Idea</button>
        </div>

        <div id="idea-container" class="idea-grid">
            </div>
    </div>

    <div id="idea-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; justify-content:center; align-items:center;">
        <div class="panel-card" style="width: 90%; max-width: 400px; padding: 24px;">
            <h3>Post Your Idea</h3>
            <form id="idea-form" onsubmit="window.hantarIdea(event)" style="display:flex; flex-direction:column; gap:15px; margin-top:20px;">
                <input type="text" id="idea-title" placeholder="Idea Title" required style="height:40px; padding:10px;">
                <textarea id="idea-desc" placeholder="Explain your idea..." required style="height:100px; padding:10px;"></textarea>
                <button type="submit" class="btn-action-primary">Submit Idea</button>
            </form>
        </div>
    </div>
    <script type="module" src="idea-script.js"></script>
</body>
</html>
