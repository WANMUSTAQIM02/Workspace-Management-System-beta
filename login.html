<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Workspace Pro</title>
    <link rel="stylesheet" href="style.css?v=3.1.3">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght=300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dark-theme">
    <div id="toast-container" style="position:fixed; bottom:24px; right:24px; z-index:9999; display:flex; flex-direction:column; gap:10px;"></div>

    <div class="system-toolbar" style="justify-content: flex-end;">
        <button onclick="window.toggleTheme()" class="theme-btn" aria-label="Toggle Theme">
            <i class="fas fa-moon" id="theme-icon"></i>
        </button>
    </div>

    <div class="central-wrapper" style="display: flex; justify-content: center; align-items: center; min-height: 90vh;">
        <main class="panel-card auth-card" id="auth-container">
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Please log in to access the workspace management system.</p>
            </div>
            <form id="auth-form" onsubmit="window.kendalikanAutentikasi(event)" class="auth-form-layout">
                <div class="input-group-wrapper">
                    <label for="auth-email">Email Address</label>
                    <input type="email" id="auth-email" required>
                </div>
                <div class="input-group-wrapper">
                    <label for="auth-password">Password</label>
                    <input type="password" id="auth-password" required>
                </div>
                <button type="submit" id="auth-submit-btn" class="btn-action-primary">Log In</button>
                <div class="auth-footer">
                    <span id="auth-toggle-text" onclick="window.toggleAuthMode()" style="cursor: pointer; color: var(--brand-blue); display: block; text-align: center; margin-top: 15px;">Don't have an account? Register Now</span>
                </div>
            </form>
        </main>
    </div>

    <script type="module" src="script.js?v=3.1.3"></script>
</body>
</html>
